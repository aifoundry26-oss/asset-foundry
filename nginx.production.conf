events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # ═══════════════════════════════════════════════
        # COMPRESIÓN
        # ═══════════════════════════════════════════════
        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

        # ═══════════════════════════════════════════════
        # HEADERS DE SEGURIDAD (Producción)
        # ═══════════════════════════════════════════════
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ═══════════════════════════════════════════════
        # STREAMLIT DASHBOARD
        # ═══════════════════════════════════════════════
        # Redirección estricta sin barra final
        location = /dashboard {
            return 301 /dashboard/;
        }

        location /dashboard/ {
            proxy_pass http://dashboard:8501/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets (Streamlit los necesita)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ═══════════════════════════════════════════════
        # N8N WORKFLOWS
        # ═══════════════════════════════════════════════
        # Redirección estricta sin barra final
        location = /workflows {
            return 301 /workflows/;
        }

        # Webhooks e Interfaz n8n
        location /workflows/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets y SSE (n8n los necesita para la UI y webhooks)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_connect_timeout 86400s;
            proxy_send_timeout 86400s;
            
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
        }

        # ═══════════════════════════════════════════════
        # FLASK API
        # ═══════════════════════════════════════════════
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://flask:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ═══════════════════════════════════════════════
        # HEALTH CHECK
        # ═══════════════════════════════════════════════
        location /healthz {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ═══════════════════════════════════════════════
        # FRONTEND ESTÁTICO
        # ═══════════════════════════════════════════════
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache largo para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            # Cache corto para el video (puede ser grande)
            location ~* \.(mp4|webm|ogg)$ {
                expires 7d;
                add_header Cache-Control "public";
            }
        }
    }
}
