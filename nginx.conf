events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

        # Redirección estricta para Streamlit
        location = /dashboard {
            return 301 /dashboard/;
        }

        # Streamlit Dashboard
        location /dashboard/ {
            proxy_pass http://asset_foundry_dashboard:8501/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Redirección estricta para n8n
        location = /workflows {
            return 301 /workflows/;
        }

        # Webhooks e Interfaz n8n
        location /workflows/ {
            proxy_pass http://asset_foundry_n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_connect_timeout 86400s;
            proxy_send_timeout 86400s;
            
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
        }

        # Flask API
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://asset_foundry_flask:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check
        location /healthz {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Static Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
