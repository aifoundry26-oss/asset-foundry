# =====================================================================
# Asset Foundry — Docker Compose para Producción (Railway / VPS)
# =====================================================================
# Este archivo reemplaza al docker-compose.yml para despliegues en la nube.
# Diferencias respecto al entorno local:
#   - Sin Ngrok (Railway provee dominio público automáticamente).
#   - Variables de entorno parametrizadas con ${DOMAIN:-localhost}.
#   - Nginx configurado para producción con headers de seguridad.
# =====================================================================
# USO:
#   docker compose -f docker-compose.production.yml up -d
# =====================================================================

version: '3.8'

networks:
  asset_foundry_net:
    driver: bridge

volumes:
  n8n_data:
    driver: local

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: asset_foundry_nginx
    ports:
      - "${PORT:-80}:80"
    depends_on:
      flask:
        condition: service_healthy

    networks:
      - asset_foundry_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset_foundry_flask
    command: python modules/generar_libro.py
    networks:
      - asset_foundry_net
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    expose:
      - 9000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset_foundry_dashboard
    command: streamlit run modules/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.baseUrlPath=/dashboard
    networks:
      - asset_foundry_net
    environment:
      - PYTHONUNBUFFERED=1
      # URL base del dominio público (para enlaces internos del dashboard)
      - BASE_DOMAIN=${DOMAIN:-localhost}
    expose:
      - 8501
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: asset_foundry_n8n
    networks:
      - asset_foundry_net
    environment:
      - N8N_PATH=/workflows/
      # Las URLs ahora usan el dominio de producción (Railway asigna automáticamente)
      - N8N_EDITOR_BASE_URL=https://${DOMAIN:-localhost}/workflows/
      - WEBHOOK_URL=https://${DOMAIN:-localhost}/workflows/
      - N8N_PROXY_HOPS=1
      - N8N_DEPLOYMENT_TYPE=single
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Madrid
      - DB_TYPE=sqlite
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_DIAGNOSTICS_ENABLED=false
    expose:
      - 5678
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
