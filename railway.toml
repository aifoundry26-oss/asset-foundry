# =====================================================================
# Railway.app — Configuración de Despliegue para Asset Foundry
# =====================================================================
# Este archivo le indica a Railway cómo construir y ejecutar el proyecto.
# Railway detecta automáticamente el docker-compose.production.yml.
#
# Instrucciones de Despliegue:
#   1. Sube el proyecto a un repositorio Git (GitHub/GitLab).
#   2. Conecta el repo en https://railway.app/new.
#   3. Railway detectará este archivo y usará Docker Compose.
#   4. Configura las variables de entorno en el panel de Railway:
#      - RAILWAY_PUBLIC_DOMAIN (se asigna automáticamente)
#   5. Haz clic en "Deploy".
# =====================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python modules/generar_libro.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
